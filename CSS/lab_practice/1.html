<!DOCTYPE html>
<html>
<head>
    <style>
        .box {
            width: 400px;
            height: 300px;
            background-color: #9b59b6;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .title {
            font-size: 48px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            font-size: 18px;
            color: #ecf0f1;
            margin-top: 30px;  /* Space between the lines */
            text-shadow: none;
            text-align: center;
            padding: 0 20px; /* Optional: prevent edge overflow */
        }
    </style>
</head>
<body>

    <div class="box">
        <div class="title">dropFont</div>
        <div class="subtitle">
            create a simple, configurable, and animated 3D text effect using jQuery and CSS shadows
        </div>
    </div>

</body>
</html>
