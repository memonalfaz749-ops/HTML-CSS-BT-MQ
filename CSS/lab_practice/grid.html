<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     .footer {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 40px;
  padding: 40px 80px;
  background: #000;
  color: #fff;
  font-family: Arial, sans-serif;
}

.footer-col p {
  margin: 8px 0;
  opacity: 0.75;
}

.footer-col .title {
  opacity: 1;
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 12px;
}

.social img {
  width: 28px;
  margin-right: 12px;
  cursor: pointer;
  opacity: 0.8;
  transition: 0.3s;
}

.social img:hover {
  opacity: 1;
}

.copy {
  text-align: center;
  padding: 20px 0;
  background: #000;
  color: #fff;
  font-size: 14px;
  opacity: 0.7;
}

    </style>
</head>
<body>
    <footer class="footer">
  <div class="footer-col">
    <p class="title">Customer Help Centre</p>
    <p>Contact us</p>
    <p>Anarc User Manual</p>
    <p>FAQs for Anarc</p>
    <p>Improvements in Anarc</p>
  </div>

  <div class="footer-col">
    <p class="title">Terms of Use</p>
    <p>Return/Cancellation Policy</p>
    <p>Privacy Policy</p>
  </div>

  <div class="footer-col social-col">
    <div class="social">
      <img src="instagram.svg" alt="">
      <img src="linkedin.svg" alt="">
      <img src="youtube.svg" alt="">
    </div>
  </div>
</footer>

<p class="copy">Copyright © 2025. Layers. All rights reserved.</p>
</body>
</html>
