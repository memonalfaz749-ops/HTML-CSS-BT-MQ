<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    body {
        background-color: #111;
        color: white;
        text-align: center;
        margin-top: 100px;
        font-family: Arial;
    }

    button {
        padding: 10px 20px;

        cursor: pointer;
        transition: 0.3s;

    button:hover {

        transform: scale(1.1);
    }
</style>
</head>
<body>

    <button>Start Building</button>
