<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flipkart - Sign In / Sign Up</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white shadow-lg rounded-lg w-full max-w-4xl flex overflow-hidden">
    <!-- Left Section -->
    <div class="bg-blue-600 text-white w-1/2 p-10 hidden md:flex flex-col justify-center">
      <h1 class="text-3xl font-bold mb-4">Flipkart Sign In / Sign Up</h1>
      <p class="text-lg">Get access to your Orders, Wishlist and Recommendations</p>
    </div>

    <!-- Right Section -->
    <div class="w-full md:w-1/2 p-8">
      <!-- Tabs -->
      <div class="flex mb-6 border-b border-gray-300">
        <button id="signInBtn" class="w-1/2 py-2 text-center font-semibold text-blue-600 border-b-2 border-blue-600">Sign In</button>
        <button id="signUpBtn" class="w-1/2 py-2 text-center font-semibold text-gray-600">Sign Up</button>
      </div>

      <!-- Sign In Form -->
      <form id="signInForm" class="space-y-4">
        <input type="email" placeholder="Enter Email" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
        <input type="password" placeholder="Enter Password" required class="w-full px-4 py-2 border rounded-md focus:ring-2 focus:ring-blue-500">
        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700">Login</button>
        <p class="text-sm text-gray
