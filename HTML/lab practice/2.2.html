<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body bgcolor="pink">
    <form action="">
        <center>
            <h1><b>Student Registration Form</b></h1>
        </center>
        <table align="center" cellspacing="5">
            <tr>
                <td ><label for="">Roll no :</label></td>
                <td><input type="text" size="50px"></td>
            </tr>
            <tr>
                <td ><label for="">Student name :</label></td>
                <td>
                    <input type="text" placeholder="First Name" size="21.5">
                    -
                    <input type="text" placeholder="Last Name" size="21">
                </td>
            </tr>
            <tr>
                <td><label for="">Fathers's Name :</label></td>
                <td><input type="text" size="50"></td>
            </tr>
            <tr>
                <td ><label for="">Date of Birth :</label></td>
                <td>
                    <input type="text" placeholder="Day" size="1">
                    -
                    <input type="text" placeholder="Month" size="3">
                    -
                    <input type="text" placeholder="Year" size="5">
                </td>
            </tr>
            <tr>
                <td ><label for="">Mobile no :</label></td>
                <td>
                    <input type="text" value="+91" readonly size="1">-
                    <input type="tel" name="" id="" size="42">
                </td>
            </tr>
            <tr>
                <td ><label for="">Email id :</label></td>
                <td><input type="email" size="50"></td>
            </tr>
            <tr>
                <td ><label for="">Password :</label></td>
                <td><input type="password" size="50"></td>
            </tr>
            <tr>
                <td ><label for="">Gender :</label></td>
                <td>
                    <input type="radio" name="Gender">Male
                    <input type="radio" name="Gender">Female
                </td>
            </tr>
            <tr>
                <td ><label for="">Department :</label></td>
                <td>
                    <input type="checkbox" name="Department">CSE
                    <input type="checkbox" name="Department">IT
                    <input type="checkbox" name="Department">ECE
                    <input type="checkbox" name="Department">Civil
                    <input type="checkbox" name="Department">Mech
                </td>
            </tr>
            <tr>
                <td ><label for="">Course :</label></td>
                <td>
                    <select name="" id="" >
                        <option value="" hidden >---------------Select Cuurrent Courses---------------</option>
                        <option value="">BTECH</option>
                        <option value="">BCA</option>
                        <option value="">MCA</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td ><label for="">Student photo :</label></td>
                <td><input type="file" name="" id=""></td>
            </tr>
            <tr>
                <td ><label for="">City :</label></td>
                <td><input type="text" size="50"></td>
            </tr>
            <tr>
                <td ><label for="">Address :</label></td>
                <td><textarea name="" id="" rows="5" cols="48"></textarea></td>
            </tr>
             
             <tr>
                <td><label for="">Color</label></td>
                <td><input type="color" name="" id=""></td>
             </tr>
             <tr>
                <td><label for="">Range</label></td>
                <td><input type="range"></td>
             </tr>
             <tr>
                <td colspan="2" align="center"><input type="submit" name="" id="" value="register" cols="2"></td>
             </tr>
        </table>
    </form>
</body>

</html>
