<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="" >
        <table align="center" border="1" cellspacing="0" width="80%" height="500px">
            <center><h1><b>Job Application Form</b></h1></center>
            <tr >
                <td align="center"><label for="" >Full Name : <font color="red">*</font></label></td>
                <td><input type="text" placeholder="Enter your Name" required></td>
            </tr>
            <tr >
                <td align="center"><label for="">Email :</label></td>
                <td><input type="email" aria-colspan="2"></td>
            </tr >
            <tr>
                <td><center><label for="">Phone Number :</label></center></td>
                <td><input type="tel" placeholder="123-456-7890" readonly></td>
            </tr>
            <tr>
                <td><center><label for="">Gender :</label></center></td>
                <td>
                    <input type="radio" name="Gender">Male
                    <input type="radio" name="Gender">Female
                </td>
            </tr>
            <tr>
                <td align="center">Date of Birth :</td>
                <td><input type="date"></td>
            </tr>
            <tr>
                <td align="center">Favourite Color :</td>
                <td><input type="color"></td>
            </tr>
            <tr>
                <td align="center">Upload Resume :</td>
                <td><input type="file"></td>
            </tr>
            <tr>
                <td align="center">Skills :</td>
                <td>
                    <input type="checkbox">HTML
                    <input type="checkbox">CSS
                    <input type="checkbox">Javascript
                    <input type="checkbox">React
                </td>
            </tr>
            <tr>
                <td align="center">Cover Letter :</td>
                <td>
                    <textarea name="" id="" rows="5" cols="25" placeholder="write something about your self"></textarea>
                </td>
            </tr>
            <tr>
                <td align="center" colspan="2">
                    <input type="submit" value="submit">
                    <input type="reset" value="reset" >
                </td>
            </tr>
        </table>
    </form>
</body>
</html>
