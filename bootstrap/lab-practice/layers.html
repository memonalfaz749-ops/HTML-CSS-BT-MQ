<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Helvetica, Arial, sans-serif;
}

body {
    background: #111;
    height: 200vh;
}

.navbar {
    width: 100%;
    height: 70px;
    background: black;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 30px;
    position: fixed;
    top: 0;
    z-index: 1000;
}

.logo {
    color: white;
    font-size: 26px;
    letter-spacing: 2px;
    font-weight: 700;
}

.nav-right {
    display: flex;
    align-items: center;
    gap: 25px;
}

.buy-btn {
    background: #2962ff;
    padding: 10px 22px;
    border-radius: 30px;
    border: none;
    color: white;
    font-size: 15px;
    cursor: pointer;
}

.icon {
    color: white;
    font-size: 20px;
    cursor: pointer;
}

.menu-icon {
    font-size: 26px;
}

/* SIDE MENU */
.side-menu {
    width: 80%;
    max-width: 350px;
    height: 100vh;
    background: #071a3d;
    position: fixed;
    top: 0;
    right: -350px;
    padding: 40px 30px;
    transition: 0.4s ease;
    z-index: 2000;
}

.side-menu.active {
    right: 0;
}

.close-icon {
    font-size: 26px;
    color: #4c79ff;
    float: right;
    cursor: pointer;
}

.side-menu ul {
    list-style: none;
    margin-top: 80px;
}

.side-menu li {
    color: white;
    font-size: 28px;
    margin-bottom: 35px;
    cursor: pointer;
}

    </style>
</head>
<body>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<nav class="navbar">
    <div class="logo">LAVERS</div>

    <div class="nav-right">
        <button class="buy-btn">Buy Now</button>

        <i class="fa-solid fa-bolt icon"></i>
        <i class="fa-regular fa-bag-shopping icon"></i>

        <i class="fa-solid fa-bars menu-icon" id="openMenu"></i>
    </div>
</nav>

<!-- SIDE MENU -->
<div class="side-menu" id="sideMenu">
    <i class="fa-solid fa-xmark close-icon" id="closeMenu"></i>

    <ul>
        <li>Our Story</li>
        <li>Anarc Watch</li>
        <li>Arcs Strap</li>
        <li>Mystery Box</li>
        <li>Accessories →</li>
    </ul>
</div>
<script>
    const openMenu = document.getElementById("openMenu");
    const closeMenu = document.getElementById("closeMenu");
    const sideMenu = document.getElementById("sideMenu");

    openMenu.onclick = () => sideMenu.classList.add("active");
    closeMenu.onclick = () => sideMenu.classList.remove("active");
</script>


</body>
</html>
